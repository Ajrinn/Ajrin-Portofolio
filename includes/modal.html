<!-- ============ CASE STUDY MODAL ============ -->
<div class="cs-progress" id="cs-progress"></div>
<div class="cs-modal" id="cs-modal" role="dialog" aria-modal="true" aria-label="Case study">
  <div class="cs-bar">
    <div class="cs-id">
      <span class="crosshair"></span>
      <div style="min-width:0">
        <div class="nm" id="cs-bar-name">Project</div>
        <div class="tg" id="cs-bar-tag">Case study</div>

    <button class="cs-close" id="cs-close">Close <span class="x">✕</span></button>
  </div>
  <div id="cs-scroll"></div>
</div>
